name: Verify aid directory

on:
  schedule:
    - cron: "0 1 * * 1" # Mondays 01:00 UTC (09:00 Beijing)
  workflow_dispatch:
  pull_request:
    paths:
      - "src/data/aidDirectory.json"
      - "scripts/verify-directory.mjs"

jobs:
  verify:
    # Cron alerts should come from one repo only (same guard as the CloudBase deploy)
    if: github.repository == 'The-unmuted/The-Unmuted-v2' || github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check directory sources
        run: node scripts/verify-directory.mjs
